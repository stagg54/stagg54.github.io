<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
    }
    h1,h2,h3 {
      margin-top: 0;
      text-align: center;
    }
    .subtitle {
      text-align: center;
    }
    .menulist {
      margin: 0;
      list-style: none;
      padding: 0;
    }
    .landing-cta {
      margin-top: 0;
      text-align: center;
    }
    .header {
      background-color: #000;
      color: #fff;
      padding: 1em;
      text-align: center;
    }
    .hero {
      background-color: #a8d6f7;
      min-height: 50vh;
      text-align: center;
    }
    .options {
      background-color: #4a7696;
      color: #fff;
      padding: 4em 0;
      .options_item_img {
        width: 100%;
      }
      .info {
        padding: 8em 0;
      }
      .feature{
        min-height: 70vh;
      }
      .footer {
        background-color: #ddd;
        padding: 4em 1em;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      I am a Header
    </div>
  </header>

  <section class="hero">
    <h1 class="hero_title">
      I am an important message
    </h1>
    <div class="hero_content">
      And I am a less important, but still a very important thing to consider.
    </div>
  </section>

</body>
</html>
