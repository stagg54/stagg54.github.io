<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid</title>
  <style>
    html,
    body {
      border: 0;
      margin: 0;
    }
    .grid-container {
      display: grid;
      grid-template-areas: "header header header" "menu content panel" "footer footer footer";
      grid-template-columns: 10em 1fr 15em;
      grid-template-rows: minmax(4em, auto) 1fr auto;
      min-height: 100vh;
    }


    .grid-header {
      background-color: #ccc;
      grid-area: header;
      padding: 1em;
      text-align: center;
    }
    .grid-menu {
      grid-area: menu;
      background-color: #c0c0c0;
      padding: 1em;
    }
    .grid-menu ul,
    .grid-panel ul,
    .grid-footer ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .grid-content {
      grid-area: content;
      padding: 3em 3em 4em;
    }
    .grid-panel {
      border-left: 1px solid rgba(0,0,0,0.1);
      grid-area: panel;
      padding: 4em 2em 4em 3em;
    }
    .grid-footer {
      background-color: #ddd;
      grid-area: footer;
      padding: 4em 1em;
      text-align: center;
    }
    .grid-footer li {
      display: inline-block;
    }
    .grid-banner {
      align-self: start;
      background-color: rgba(168,214,247, 0.9);
      grid-column: content-start / panel-end;
      grid-row-start: content-start;
      padding: 1em;
      position:sticky;
      top: 0;
      z-index: 10;
    }

  </style>
</head>
<body>
  <div class="grid-container">
    <header class="grid-header">I am a Header</header>
    <nav class="grid-menu">
      I am a Menu
    </nav>
    <article class="grid-content">
      I am Content
    </article>
    <aside class="grid-panel">
      I am Info
    </aside>
    <footer class="grid-footer">
      I am a Footer
    </footer>
    <div class="grid-banner">I am a banner</div>
  </div>


</body>
</html>
